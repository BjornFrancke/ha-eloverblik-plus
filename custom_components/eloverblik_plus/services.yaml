backfill_history:
  name: Backfill history
  description: Rebuild imported hourly statistics for a larger history window.
  fields:
    metering_point:
      name: Metering point
      description: Required when multiple Eloverblik Plus entries are configured.
      example: "999999999999999999"
      selector:
        text:
    days:
      name: Days
      description: Number of days of hourly history to fetch and rebuild.
      default: 30
      required: true
      selector:
        number:
          min: 1
          max: 730
          mode: box
